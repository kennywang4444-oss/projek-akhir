<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel by kenny wang 8i</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #carousel{
            position: relative;
            max-width: 100%;
            width: 100%;
            height: 92vh;
            overflow: hidden;

        }

        #carousel-bks{
            display: flex;
            transition: transform 0.5s ease-in-out;
        }

        .slide{
            min-width: 100%;
            object-fit: cover;
        }

        #prev,#next{
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            background: none;
            border: none;
            font-size: 2rem;
            padding: 20px;
            cursor: pointer;
            z-index: 99;    
        }
        #prev{
            left: 10px;

        }

        #next{
            right: 10px;
        }


    </style>
</head>
<body>
    <nav>
        <div class="menu-container">
            <div class="logo">Store app</div>

            <ul class="menu">
                <li><a href="#">Home</a></li>
                <li><a href="#">Product</a></li>
                <li><a href="#">Gallery</a></li>
            </ul>
        </div>
    </nav>
    <div id="carousel">
        <button id="prev">⏮️</button>

        <div id="carousel-bks">
            <img src="img/Screenshot 2024-12-02 204501.png" alt="banner 1" class="slide">
            <img src="img/RobloxScreenShot20250719_133118379.png" alt="banner 2" class="slide">
            <img src="img/RobloxScreenShot20241108_191527497.png" alt="banner 3" class="slide">

        </div>
        <button id="next">⏭️</button>
    </div>

    <script>
        const slide = document.querySelectorAll('.slide');
        const bks = document.getElementById('carousel-bks');
        const nextBtn = document.getElementById('next');
        const prevBtn = document.getElementById('prev');

        let currentIndex = 0 

        function showSlide(index){
            bks.style.transform = `translateX(-${index * 100}%)`;

        }

        nextBtn.addEventListener('click' , () => {
            currentIndex = (currentIndex + 1) % slide.length;
            showSlide(currentIndex);
        });

        prevBtn.addEventListener('click', ()=>{
            currentIndex = (currentIndex - 1 + slide.length) % slide.length
            showSlide(currentIndex)
        })
    </script>
</body>
</html>
