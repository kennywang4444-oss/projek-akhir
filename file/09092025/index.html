     <div class="navbar">

    <div class="container3">

    <select name="" id="film">

    <h4>Harga</h4>

        <input type="number" id="j_tiket">
     <h4>Jumlah Bayar</h4>

       <div class="buttons1">
         <button onclick="hitung()">Hitung</button>

    </div>
    </div>
    <script>
        let selectElement = document.getElementById('film');
        let imgElement = document.getElementById('img')
        selectElement.addEventListener("change", function(){
            let selectValue = selectElement.value;

            if(selectValue === "film1"){
                imgElement.src ='5.jpeg'
                harga = 54000
                sinopsis = 'Bagus Banget, keren.'
            }else if(selectValue === "film2"){
                imgElement.src = '20.jpeg'
                harga = 50000

            }else if(selectValue === "film3"){
                imgElement.src = '19.jpeg'
                harga = 55000

            }else if(selectValue === "film4"){
                imgElement.src = '21.jpeg'
                harga = 65000
                sinopsis = 'KEREN BANGET HAHAHAH'
            }else if(selectValue === "film5"){

                harga = 50000
                sinopsis = 'Seru, keren'
            }else if(selectValue === "film6"){
                imgElement.src = '11.jpeg'

            }else if(selectValue === "film7"){

            }else if(selectValue === "film9"){
                imgElement.src = '9.jpeg'

            }else if(selectValue === "film10"){
                imgElement.src = '18.jpeg'
                harga = 50000
                sinopsis = 'SEDIH'
            }
            document.getElementById('harga').textContent = harga;
            document.getElementById('sinopsis').textContent = sinopsis;

        });
        function hitung(){
            let j_tiket = parseFloat(document.getElementById('j_tiket').value)
            let bayar = harga * j_tiket;
            const format = bayar.toLocaleString('id-ID');
            document.getElementById('bayar').textContent = `Rp${format}`;
        }
    </script>
