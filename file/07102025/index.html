<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Animasi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  
    <div class="tul">
    <h1>Scroll untuk melihat animasi</h1>
    </div>
    <div class="box"><h2>X</h2></div>
    <div class="box"><h2>A</h2></div>
    <div class="box"><h2>V</h2></div>
    <div class="box"><h2>I</h2></div>
    <div class="box"><h2>E</h2></div>
    <div class="box"><h2>R</h2></div>
    <div class="box"><h2>A</h2></div>
    <div class="box"><h2>N</h2></div>
    <div class="box"><h2>D</h2></div>
    <div class="box"><h2>R</h2></div>
    <div class="box"><h2>E</h2></div>
    <div class="box"><h2>W</h2></div>
    <div class="box"><h2>M</h2></div>
    <div class="box"><h2>C</h2></div>
    <div class="box"><h2>D</h2></div>
   

    <script>
        const boxes = document.querySelectorAll('.box')
        window.addEventListener('scroll',checkBoxes)

        checkBoxes()

        function checkBoxes(){
            const triggerButton = window.innerHeight / 5 * 4;

            boxes.forEach(box => {
                const boxtop = box.getBoundingClientRect().top

                if(boxtop < triggerButton){
                    box.classList.add('show')
                } else {
                    box.classList.remove('show')
                }
            })
        }

    
    </script>
</body>
</html>
